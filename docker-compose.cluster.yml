  valkey-c6:
    <<: *valkey-node
    container_name: ocaml-valkey-c6
    networks: [ valkey-cluster ]
    ports: [ "7005:7005", "17005:17005" ]
    command: >-
      valkey-server
      --port 7005
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-port 17005
      --cluster-announce-hostname valkey-c6
      --cluster-announce-human-nodename valkey-c6
      --cluster-preferred-endpoint-type hostname
      --cluster-announce-port 7005
      --cluster-announce-bus-port 17005
      --appendonly no
      --save ""
      --protected-mode no
    healthcheck:
      test: [ "CMD", "valkey-cli", "-p", "7005", "PING" ]
      interval: 2s
      timeout: 1s
      retries: 10

  # One-shot bootstrap. Idempotent on an already-formed cluster.
  cluster-init:
    image: valkey/valkey:9
    container_name: ocaml-valkey-cluster-init
    networks: [ valkey-cluster ]
    depends_on:
      valkey-c1: { condition: service_healthy }
      valkey-c2: { condition: service_healthy }
      valkey-c3: { condition: service_healthy }
      valkey-c4: { condition: service_healthy }
      valkey-c5: { condition: service_healthy }
      valkey-c6: { condition: service_healthy }
    entrypoint: [ "sh", "-c" ]
    command:
      - |
        set -e
        if valkey-cli -h valkey-c1 -p 7000 CLUSTER INFO \
             | grep -q 'cluster_state:ok'; then
          echo "cluster already formed"; exit 0
        fi
        echo "bootstrapping cluster"
        yes yes | valkey-cli --cluster create \
          valkey-c1:7000 valkey-c2:7001 valkey-c3:7002 \
          valkey-c4:7003 valkey-c5:7004 valkey-c6:7005 \
          --cluster-replicas 1
        for _ in $$(seq 1 30); do
          if valkey-cli -h valkey-c1 -p 7000 CLUSTER INFO \
               | grep -q 'cluster_state:ok'; then
            echo "cluster is ok"; exit 0
          fi
          sleep 1
        done
        echo "cluster did not reach ok"; exit 1
    restart: "no"
