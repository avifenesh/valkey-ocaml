name: Fuzz (nightly)

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC every day
  workflow_dispatch:       # manual trigger for ad-hoc deep runs

concurrency:
  group: fuzz-nightly
  cancel-in-progress: false

permissions:
  contents: read
  issues: write           # auto-file an issue on a fuzz failure

jobs:
  parser-fuzz-deep:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3.0"

      - name: Install opam deps
        run: opam install . --deps-only --with-test --yes

      - name: Build
        run: opam exec -- dune build

      - name: Parser fuzzer — 30 min strict with fresh seed
        run: |
          # Roughly 250M inputs at the current ~140k/s rate.
          seed=$(date +%s)
          echo "seed=$seed"
          # Bound the run by iteration count (large enough to fill
          # ~30 min) rather than wall time; 200M leaves a safety
          # margin under the job timeout.
          opam exec -- dune exec bin/fuzz_parser/fuzz_parser.exe -- \
            --iterations 200000000 --seed "$seed" --strict \
            | tee parser-fuzz.log
        continue-on-error: true
        id: parser

      - name: Upload parser fuzz log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parser-fuzz-nightly-${{ github.run_id }}
          path: parser-fuzz.log
          retention-days: 30

      - name: Open issue on failure
        if: steps.parser.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `nightly parser fuzz failed (run ${context.runId})`,
              body: [
                "Nightly parser fuzzer exited non-zero.",
                "",
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                "Log artifact: `parser-fuzz-nightly-${context.runId}`",
                "",
                "The fuzzer's shrinker prints the minimal reproducer right",
                "before exit; look for 'minimal: ...' in the log.",
              ].join('\n'),
              labels: ["fuzz", "nightly"]
            });

  stability-fuzz-deep:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3.0"

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y pkg-config libssl-dev libgmp-dev

      - name: Install opam deps
        run: opam install . --deps-only --with-test --yes

      - name: Generate TLS dev certs
        run: bash scripts/gen-tls-certs.sh

      - name: Start cluster
        run: |
          sudo bash scripts/cluster-hosts-setup.sh
          docker compose -f docker-compose.cluster.yml up -d
          for i in $(seq 1 60); do
            status=$(docker inspect -f '{{.State.Status}}' ocaml-valkey-cluster-init 2>/dev/null || echo missing)
            if [ "$status" = "exited" ]; then
              code=$(docker inspect -f '{{.State.ExitCode}}' ocaml-valkey-cluster-init)
              if [ "$code" = "0" ]; then echo cluster up; break; fi
              exit 1
            fi
            sleep 2
          done

      - name: Build
        run: opam exec -- dune build

      - name: Stability fuzz — 15 min cluster w/ docker-restart chaos
        id: stability
        run: |
          opam exec -- dune exec bin/fuzz/fuzz.exe -- \
            --seeds valkey-c1:7000,valkey-c2:7001,valkey-c3:7002 \
            --seconds 900 --workers 16 \
            --chaos-node-restart ocaml-valkey-c1,ocaml-valkey-c2,ocaml-valkey-c3 \
            --chaos-interval 120 \
            --max-errors 0 \
            | tee stability-fuzz.log
        continue-on-error: true

      - name: Upload stability fuzz log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stability-fuzz-nightly-${{ github.run_id }}
          path: stability-fuzz.log
          retention-days: 30

      - name: Open issue on failure
        if: steps.stability.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `nightly stability fuzz failed (run ${context.runId})`,
              body: [
                "Nightly stability fuzzer exited non-zero against the",
                "cluster with docker-restart chaos enabled.",
                "",
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                "Log artifact: `stability-fuzz-nightly-${context.runId}`",
              ].join('\n'),
              labels: ["fuzz", "nightly", "chaos"]
            });

      - name: Stop cluster
        if: always()
        run: docker compose -f docker-compose.cluster.yml down -v || true
