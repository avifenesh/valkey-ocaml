# Dev-only Valkey target for the client.
# Exposes :6379 (plain) and :6390 (TLS).
#
# Usage:
#   bash scripts/gen-tls-certs.sh   # once; self-signed certs in ./tls/
#   docker compose up -d
#   docker compose logs -f valkey
#   docker compose down             # stop & remove
#   docker compose down -v          # stop & wipe data

services:
  valkey:
    image: valkey/valkey:8
    container_name: ocaml-valkey-dev
    ports:
      - "6379:6379"
      - "6390:6390"
    volumes:
      - ./tls:/tls:ro
    command: >-
      valkey-server
      --appendonly no
      --save ""
      --protected-mode no
      --port 6379
      --tls-port 6390
      --tls-cert-file /tls/server.crt
      --tls-key-file /tls/server.key
      --tls-ca-cert-file /tls/ca.crt
      --tls-auth-clients no
    healthcheck:
      test: ["CMD", "valkey-cli", "-p", "6379", "PING"]
      interval: 2s
      timeout: 1s
      retries: 10
    restart: unless-stopped
